<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompuSurf Sovereign AI Mastery v2.0 • Visual Compass</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --accent: #0f172a;
            --success: #166534;
            --border: #e2e8f0;
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            line-height: 1.5;
        }
        
        .nav {
            background: white;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .container {
            max-width: 1536px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .phase-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.25rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .phase-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgb(15 23 42 / 0.1), 0 4px 6px -4px rgb(15 23 42 / 0.1);
        }
        
        .phase-card.completed {
            border-color: #166534;
            background: #f0fdf4;
        }

        .section-title {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.03em;
        }

        .milestone-label {
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            font-size: 0.875rem;
            padding: 0.15rem 0;
            cursor: pointer;
        }
        
        .milestone-label:hover span {
            color: #0f172a;
        }

        .milestone-checkbox {
            width: 1rem;
            height: 1rem;
            accent-color: #0f172a;
            margin-top: 0.15rem;
            flex-shrink: 0;
        }

        .progress-ring {
            transition: stroke-dashoffset 0.4s ease;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.1rem;
            font-size: 0.875rem;
            font-weight: 500;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 9999px;
            text-decoration: none;
            color: #334155;
            transition: all 0.1s ease;
        }
        
        .nav-btn:hover {
            background: #f8fafc;
        }

        .focus-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 10px 15px -3px rgb(15 23 42 / 0.08);
        }

        .phase-number {
            font-family: ui-monospace, monospace;
            font-size: 0.7rem;
            padding: 0.1rem 0.55rem;
            background: #0f172a;
            color: white;
            border-radius: 9999px;
            font-weight: 600;
        }

        .ship-quote {
            font-size: 0.75rem;
            color: #166534;
            font-style: italic;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid #e2e8f0;
        }

        .stat-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
        }

        .grid-phases {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }

        @media (min-width: 1280px) {
            .grid-phases {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: #0f172a;
            color: white;
            padding: 0.75rem 1.25rem;
            border-radius: 1rem;
            font-size: 0.875rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.2);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 200;
        }

        .architecture-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.75rem;
            text-align: center;
        }
        
        .arch-layer {
            background: #0f172a;
            color: white;
            padding: 1rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
        }
        
        .arch-layer .label {
            font-size: 0.65rem;
            opacity: 0.7;
            margin-bottom: 0.25rem;
        }

        .storage-warning {
            background: #fefce8;
            border: 1px solid #fde047;
            color: #854d0e;
            font-size: 0.8rem;
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
    </style>
</head>
<body>
    <!-- DASHBOARD_BODY_PLACEHOLDER -->
</body>
</html>
