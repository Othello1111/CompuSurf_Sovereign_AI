<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompuSurf Sovereign AI Mastery v2.0 • Visual Compass</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        :root { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b; --accent: #0f172a; --success: #166534; --border: #e2e8f0; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.5; }
        .nav { background: white; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
        .container { max-width: 1536px; margin: 0 auto; padding: 0 2rem; }
        .phase-card { background: var(--card); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.25rem; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; height: 100%; }
        .phase-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgb(15 23 42 / 0.1), 0 4px 6px -4px rgb(15 23 42 / 0.1); }
        .phase-card.completed { border-color: #166534; background: #f0fdf4; }
        .section-title { font-size: 1.75rem; font-weight: 600; letter-spacing: -0.03em; }
        .milestone-label { display: flex; align-items: flex-start; gap: 0.6rem; font-size: 0.875rem; padding: 0.15rem 0; cursor: pointer; }
        .milestone-checkbox { width: 1rem; height: 1rem; accent-color: #0f172a; margin-top: 0.15rem; flex-shrink: 0; }
        .progress-ring { transition: stroke-dashoffset 0.4s ease; }
        .nav-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1.1rem; font-size: 0.875rem; font-weight: 500; background: white; border: 1px solid #cbd5e1; border-radius: 9999px; text-decoration: none; color: #334155; cursor: pointer; }
        .focus-card { background: white; border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.5rem; box-shadow: 0 10px 15px -3px rgb(15 23 42 / 0.08); }
        .phase-number { font-family: ui-monospace, monospace; font-size: 0.7rem; padding: 0.1rem 0.55rem; background: #0f172a; color: white; border-radius: 9999px; font-weight: 600; }
        .ship-quote { font-size: 0.75rem; color: #166534; font-style: italic; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid #e2e8f0; }
        .stat-card { background: white; border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.25rem; display: flex; flex-direction: column; }
        .grid-phases { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }
        @media (min-width: 1280px) { .grid-phases { grid-template-columns: repeat(4, 1fr); } }
        .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #0f172a; color: white; padding: 0.75rem 1.25rem; border-radius: 1rem; font-size: 0.875rem; z-index: 200; }
        .architecture-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; text-align: center; }
        .arch-layer { background: #0f172a; color: white; padding: 1rem 0.75rem; border-radius: 1rem; font-size: 0.75rem; }
        .arch-layer .label { font-size: 0.65rem; opacity: 0.7; margin-bottom: 0.25rem; }
        .storage-warning { background: #fefce8; border: 1px solid #fde047; color: #854d0e; font-size: 0.8rem; padding: 0.5rem 1rem; border-radius: 0.75rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.6rem; }
    </style>
</head>
<body>
    <nav class="nav"><div class="container"><div style="padding:1rem 0;display:flex;align-items:center;justify-content:space-between;"><div style="display:flex;align-items:center;gap:1rem;"><div style="font-size:1.65rem;font-weight:700;">COMPUSURF</div><div style="font-size:9px;color:#64748b;">SOVEREIGN AI v2.0</div></div><div style="display:flex;align-items:center;gap:0.85rem;"><div style="text-align:right;"><div style="font-size:10px;color:#64748b;">OVERALL PROGRESS</div><div id="overall-progress-text" style="font-size:1.85rem;font-weight:700;">0%</div></div><svg width="52" height="52" style="transform:rotate(-90deg);"><circle cx="26" cy="26" r="22" fill="none" stroke="#e2e8f0" stroke-width="6"></circle><circle id="progress-ring" cx="26" cy="26" r="22" fill="none" stroke="#0f172a" stroke-width="6" stroke-dasharray="138.23" stroke-dashoffset="138.23"></circle></svg></div><button onclick="openGROKmd()" class="nav-btn"><i class="fa-solid fa-book"></i></button><button onclick="openPrompts()" class="nav-btn"><i class="fa-solid fa-magic"></i></button></div></div></nav>
    <div class="container" style="padding-top:2rem;padding-bottom:4rem;">
        <div id="storage-warning" class="storage-warning" style="display:none;"><i class="fa-solid fa-exclamation-triangle"></i><span>Session-only mode — open via file:// for permanent saving.</span></div>
        <h1 style="font-size:3rem;font-weight:700;margin:0 0 1rem;">Sovereign AI Global Mastery</h1>
        <p style="color:#475569;">Learn → Build Small → Ship → Repeat. Your 8-phase visual compass.</p>
        <div id="phases-grid" class="grid-phases" style="margin-top:2rem;"></div>
    </div>
    <footer style="border-top:1px solid #e2e8f0;background:white;padding:1.25rem 0;"><div class="container" style="font-size:0.75rem;color:#64748b;">CompuSurf Sovereign AI Mastery v2.0 • Confidential to Johann Reyneke</div></footer>
    <script>
        let progressData = {}; let canUseLocalStorage = true;
        function safeLoadProgress() { try { const saved = localStorage.getItem('compusurf_progress_v2'); progressData = saved ? JSON.parse(saved) : { completedPhases: [], milestones: {} }; } catch (e) { canUseLocalStorage = false; progressData = { completedPhases: [], milestones: {} }; document.getElementById('storage-warning').style.display = 'flex'; } }
        function safeSaveProgress() { if (!canUseLocalStorage) return; try { localStorage.setItem('compusurf_progress_v2', JSON.stringify(progressData)); } catch (e) { canUseLocalStorage = false; } }
        const phases = [
            { id: 1, number: '01', title: 'Foundation, Research & Online Presence', weeks: 'Week 1', desc: 'GROK.md + PresenceForge + professional presence', ship: 'Updated professional online presence + first certificate in progress', milestones: ['GROK.md template created & populated', 'Phase 1 GCHPP prompts ready', 'Market research completed', 'LinkedIn / X / GitHub audit + improved bio drafted'] },
            { id: 2, number: '02', title: 'Hybrid Web Intelligence Layer', weeks: 'Weeks 2-3', desc: 'Crawl4AI + PixelRAG fallback', ship: 'Production-ready Hybrid Web Tool + documentation', milestones: ['Crawl4AI installed & tested', 'PixelRAG integrated', 'Security layer added', 'Tested on trading dashboard'] },
            { id: 3, number: '03', title: 'Self-Hosted Knowledge + WhatsApp', weeks: 'Weeks 3-5', desc: 'Stirling-PDF + Evolution API dual instances', ship: 'Sovereign document processing + WhatsApp automation live', milestones: ['Stirling-PDF ready', 'Evolution API configured', 'Family reminder tested', 'Business alerts working'] },
            { id: 4, number: '04', title: 'Jarvis Execution Pipeline', weeks: 'Weeks 5-7', desc: 'Human-gated orchestration pipeline', ship: 'Jarvis pipeline handling real tasks with oversight', milestones: ['Orchestration implemented', 'Human gate functional', 'End-to-end test', 'Obsidian integrated'] },
            { id: 5, number: '05', title: 'Family Guardian Agent MVP', weeks: 'Weeks 6-7', desc: 'Local-first caregiver agent', ship: 'Shippable Family Guardian prototype', milestones: ['Core spec generated', 'Tools integrated', 'Family scenarios tested', 'Privacy documented'] },
            { id: 6, number: '06', title: 'Productization & Monetization', weeks: 'Weeks 7-9', desc: 'Sovereign DataForge positioning', ship: 'First revenue experiment + packaging', milestones: ['Landing page copy', 'GTM validated', 'First lead live', 'Packaging complete'] },
            { id: 7, number: '07', title: 'Trading Intelligence + Self-Improvement', weeks: 'Weeks 8-10', desc: 'TradeShield + DeepFlow monitoring', ship: 'Better trading agents + self-improvement running', milestones: ['Hybrid Web in trading', 'Weekly DeepFlow runs', 'Self-healing live', 'Metrics added'] },
            { id: 8, number: '08', title: 'Portfolio & Global Positioning', weeks: 'Ongoing', desc: 'GitHub + certificates + presence', ship: 'Strong professional brand for global clients', milestones: ['GitHub portfolio updated', 'Certificates submitted', 'PresenceForge maintenance', 'Bilingual docs complete'] }
        ];
        function calculateOverallProgress() { let total = 0, done = 0; phases.forEach(p => { total += p.milestones.length; done += (progressData.milestones[p.id] || []).length; }); const bonus = (progressData.completedPhases || []).length * 2; return Math.min(100, Math.round(((done + bonus) / (total + 16)) * 100)); }
        function updateOverallProgressUI() { const percent = calculateOverallProgress(); document.getElementById('overall-progress-text').textContent = percent + '%'; const ring = document.getElementById('progress-ring'); ring.setAttribute('stroke-dashoffset', 138.23 - (percent / 100 * 138.23)); }
        function renderPhases() { const grid = document.getElementById('phases-grid'); grid.innerHTML = ''; phases.forEach(phase => { const isDone = (progressData.completedPhases || []).includes(phase.id); const doneMilestones = progressData.milestones[phase.id] || []; const card = document.createElement('div'); card.className = 'phase-card' + (isDone ? ' completed' : ''); let html = '<div style="font-weight:700;">' + phase.title + '</div><div style="font-size:0.82rem;color:#475569;margin:0.5rem 0;">' + phase.desc + '</div>'; phase.milestones.forEach((m, idx) => { const checked = doneMilestones.includes(idx) ? 'checked' : ''; html += '<label class="milestone-label"><input type="checkbox" class="milestone-checkbox" ' + checked + ' onchange="toggleMilestone(' + phase.id + ',' + idx + ',this.checked)"><span>' + m + '</span></label>'; }); html += '<div class="ship-quote">"' + phase.ship + '"</div>'; card.innerHTML = html; grid.appendChild(card); }); }
        function toggleMilestone(phaseId, idx, checked) { if (!progressData.milestones[phaseId]) progressData.milestones[phaseId] = []; const arr = progressData.milestones[phaseId]; if (checked && !arr.includes(idx)) arr.push(idx); if (!checked) progressData.milestones[phaseId] = arr.filter(i => i !== idx); safeSaveProgress(); updateOverallProgressUI(); renderPhases(); }
        function openGROKmd() { window.open('GROK.md', '_blank'); }
        function openPrompts() { window.open('../prompts/phase1_gchpp_prompts.md', '_blank'); }
        function initializeDashboard() { safeLoadProgress(); renderPhases(); updateOverallProgressUI(); }
        window.onload = initializeDashboard;
    </script>
</body>
</html>
