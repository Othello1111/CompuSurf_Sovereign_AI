name: Validate SovereignSkills + HermesGraph

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install networkx

      - name: Run validation script
        run: python scripts/validate_sovereign_skills.py

      - name: Summary
        if: success()
        run: echo "✅ SovereignSkills + HermesGraph validation complete"
