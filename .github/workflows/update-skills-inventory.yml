name: Update Skills Inventory

on:
  push:
    branches: [main]
    paths:
      - "sovereign_skills/skills/**"
      - "scripts/generate_skills_inventory.py"

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate SKILLS_INVENTORY.md
        run: python scripts/generate_skills_inventory.py

      - name: Commit inventory if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/SKILLS_INVENTORY.md
          if git diff --staged --quiet; then
            echo "No inventory changes"
          else
            git commit -m "docs: auto-update SKILLS_INVENTORY.md"
            git push
          fi
